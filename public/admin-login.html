<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دخول لوحة المطورين | استديو رفودي العراقي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Tajawal:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">استديو رفودي العراقي</span>
    </div>
    <nav class="topnav">
      <a href="index.html" class="nav-link music-hover">رجوع للموقع الرئيسي</a>
    </nav>
  </header>

  <main class="admin-main">
    <div class="admin-wrap" style="max-width: 420px;">
      <span class="tag tag-music">دخول مقيّد</span>
      <h1 class="admin-heading">لوحة المطورين</h1>
      <p class="admin-sub">هذي الصفحة محمية. أدخل الرمز للمتابعة.</p>

      <form id="admin-login-form" class="upload-form">
        <div class="form-row">
          <label for="admin-code">الرمز</label>
          <input type="password" id="admin-code" name="code" required placeholder="••••••••" autocomplete="off" autofocus />
        </div>

        <button type="submit" class="upload-btn">
          <span id="login-btn-text">دخول</span>
        </button>
        <p id="login-status" class="upload-status" role="status"></p>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('admin-login-form');
    const statusEl = document.getElementById('login-status');
    const btn = form.querySelector('.upload-btn');
    const btnText = document.getElementById('login-btn-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('admin-code').value;

      btn.disabled = true;
      btnText.textContent = 'جاري التحقق...';
      statusEl.textContent = '';
      statusEl.className = 'upload-status';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();

        if (res.ok && data.success) {
          statusEl.textContent = 'تم الدخول، جاري التحويل...';
          statusEl.classList.add('success');
          window.location.href = 'admin.html';
        } else {
          statusEl.textContent = data.message || 'الرمز غير صحيح';
          statusEl.classList.add('error');
          btn.disabled = false;
          btnText.textContent = 'دخول';
        }
      } catch (err) {
        statusEl.textContent = 'تعذّر الاتصال بالسيرفر';
        statusEl.classList.add('error');
        btn.disabled = false;
        btnText.textContent = 'دخول';
      }
    });
  </script>
</body>
</html>
